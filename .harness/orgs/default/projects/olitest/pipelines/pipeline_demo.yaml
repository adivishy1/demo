pipeline:
  name: pipeline demo
  identifier: pipeline_demo
  projectIdentifier: olitest
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: stage1
        identifier: stage1
        description: ""
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  name: step1
                  identifier: step1
                  type: HarnessApproval
                  timeout: 1d
                  spec:
                    approvalMessage: <+input>
                    includePipelineExecutionHistory: true
                    approvers:
                      minimumCount: 1
                      disallowPipelineExecutor: false
                      userGroups:
                        - account._account_all_users
                    isAutoRejectEnabled: false
                    approverInputs: []
              - step:
                  type: ShellScript
                  name: ShellScript_1
                  identifier: ShellScript_1
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: "echo \"branch: \" <+trigger.branch>"
                    environmentVariables: []
                    outputVariables: []
                  timeout: 10m
        tags: {}
