template:
  name: stage template bulk
  identifier: stage_template_bulk
  versionLabel: da
  type: Stage
  projectIdentifier: demoProject
  orgIdentifier: default1
  tags: {}
  spec:
    type: Approval
    spec:
      execution:
        steps:
          - step:
              name: as
              identifier: as
              type: HarnessApproval
              timeout: 1d
              spec:
                approvalMessage: |-
                  Please review the following information
                  and approve the pipeline progression
                includePipelineExecutionHistory: true
                approvers:
                  minimumCount: <+input>
                  disallowPipelineExecutor: false
                  userGroups: <+input>
                isAutoRejectEnabled: false
                approverInputs: []
