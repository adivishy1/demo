pipeline:
  name: default1 remote pipeline
  identifier: default1_remote_pipeline
  projectIdentifier: demoProject
  orgIdentifier: default1
  tags: {}
  stages:
    - stage:
        name: das
        identifier: das
        description: ""
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  name: asd
                  identifier: asd
                  type: HarnessApproval
                  timeout: 1d
                  spec:
                    approvalMessage: |-
                      Please review the following information
                      and approve the pipeline progression
                    includePipelineExecutionHistory: true
                    approvers:
                      minimumCount: 1
                      disallowPipelineExecutor: false
                      userGroups: <+input>
                    isAutoRejectEnabled: false
                    approverInputs: []
        tags: {}
